<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — EzWorkers</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="css/style.css">
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:2rem}
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:420px;box-shadow:var(--shadow-md)}
.auth-logo{display:flex;align-items:center;gap:.6rem;margin-bottom:2rem;justify-content:center}
.auth-logo-mark{width:40px;height:40px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center}
.auth-logo-name{font-size:22px;font-weight:700;color:var(--dark)}
.auth-logo-name span{color:var(--orange)}
h1{font-size:20px;font-weight:700;color:var(--dark);margin-bottom:.25rem;text-align:center}
.auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:1.75rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:.35rem}
.field input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border .15s}
.field input:focus{border-color:var(--blue)}
.btn-primary{width:100%;padding:.75rem;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:.25rem}
.btn-primary:hover{background:var(--blue-dark)}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--muted);white-space:nowrap}
.btn-magic{width:100%;padding:.7rem;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-magic:hover{border-color:var(--blue);color:var(--blue)}
.auth-footer{text-align:center;margin-top:1.5rem;font-size:13px;color:var(--muted)}
.auth-footer a{color:var(--blue);font-weight:500}
.result{margin-top:.85rem;padding:.75rem 1rem;border-radius:var(--radius);font-size:13px;display:none}
.result.error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
.result.success{background:#f0fdf4;border:1px solid #86efac;color:#15803d}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{flex:1;padding:.6rem;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:-1px}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="9" cy="8" r="3.5" stroke="#fff" stroke-width="1.8"/>
          <path d="M3 19c0-3.314 2.686-6 6-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M15 13l2 2 4-4" stroke="#F47B2B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="auth-logo-name">Ez<span>Workers</span></div>
    </div>

    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your EzWorkers account</p>

    <div class="tabs">
      <button class="tab active" id="tab-password" onclick="switchTab('password')">Password</button>
      <button class="tab" id="tab-magic" onclick="switchTab('magic')">Magic link</button>
    </div>

    <!-- Password login -->
    <div id="panel-password">
      <div class="field">
        <label for="email-pw">Email address</label>
        <input type="email" id="email-pw" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doSignIn()">
      </div>
      <button class="btn-primary" id="btn-signin" onclick="doSignIn()">Sign in</button>
      <div class="result" id="result-pw"></div>
    </div>

    <!-- Magic link -->
    <div id="panel-magic" style="display:none">
      <div class="field">
        <label for="email-magic">Email address</label>
        <input type="email" id="email-magic" placeholder="you@example.com" autocomplete="email"
               onkeydown="if(event.key==='Enter') doMagicLink()">
      </div>
      <button class="btn-primary" id="btn-magic" onclick="doMagicLink()">Send magic link</button>
      <div class="result" id="result-magic"></div>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one free</a>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script>
// Redirect if already logged in
if (isLoggedIn()) {
  const profile = getProfile();
  window.location.href = profile?.role === 'employer' ? 'employer-dashboard.html' : 'dashboard.html';
}

// Handle magic link callback
handleMagicLinkCallback();

const nextUrl = new URLSearchParams(location.search).get('next') || 'dashboard.html';

function switchTab(tab) {
  document.getElementById('tab-password').classList.toggle('active', tab === 'password');
  document.getElementById('tab-magic').classList.toggle('active', tab === 'magic');
  document.getElementById('panel-password').style.display = tab === 'password' ? 'block' : 'none';
  document.getElementById('panel-magic').style.display    = tab === 'magic'    ? 'block' : 'none';
}

function showResult(elId, type, msg) {
  const el = document.getElementById(elId);
  el.style.display = 'block';
  el.className = `result ${type}`;
  el.textContent = msg;
}

async function doSignIn() {
  const email    = document.getElementById('email-pw').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-signin');

  if (!email || !password) { showResult('result-pw', 'error', 'Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    await signIn(email, password);
    window.location.href = nextUrl;
  } catch (e) {
    showResult('result-pw', 'error', e.message);
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

async function doMagicLink() {
  const email = document.getElementById('email-magic').value.trim();
  const btn   = document.getElementById('btn-magic');

  if (!email) { showResult('result-magic', 'error', 'Please enter your email address.'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    await sendMagicLink(email);
    showResult('result-magic', 'success', `Magic link sent to ${email}. Check your inbox and click the link to sign in.`);
    btn.textContent = 'Resend link';
    btn.disabled = false;
  } catch (e) {
    showResult('result-magic', 'error', e.message);
    btn.disabled = false;
    btn.textContent = 'Send magic link';
  }
}
</script>
</body>
</html>
