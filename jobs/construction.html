<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction & Infrastructure Jobs GCC 2026 | EzWorkers</title>
<meta name="description" content="Browse construction, civil engineering and infrastructure jobs across the GCC region. Daily updates.">
<meta name="google-site-verification" content="7JY2z2pa6VAKSsWzTp4E1_4s-v7vc0O73CCJJDSssoE">
<link rel="canonical" href="https://ezworkers.com/jobs/construction.html">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;font-size:15px;color:#1e293b;background:#fff;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.wrap{max-width:1160px;margin:0 auto;padding:0 1.25rem}
.hero{background:linear-gradient(135deg,#0d3d6e,#1A6FC4);color:#fff;padding:3rem 1.25rem 2.5rem;text-align:center}
.hero h1{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:700;margin-bottom:.5rem;letter-spacing:-.3px}
.hero p{font-size:15px;opacity:.85;max-width:560px;margin:0 auto .75rem}
.count{font-size:14px;opacity:.7}
.sbox{display:flex;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15);max-width:520px;margin:1.25rem auto 0}
.sbox input{flex:1;border:none;outline:none;padding:.75rem 1rem;font-size:15px;font-family:inherit;color:#1e293b}
.sbox button{background:#F47B2B;color:#fff;border:none;padding:.75rem 1.5rem;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.jobs-hdr{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1rem;border-bottom:1px solid #e2e8f0}
.jct{font-size:14px;color:#64748b}.jct strong{color:#1e293b}
.jcard{display:grid;grid-template-columns:48px 1fr auto;gap:1rem;align-items:start;padding:1.25rem 0;border-bottom:1px solid #e2e8f0;color:inherit;transition:background .12s}
.jcard:hover{background:#fafbff;margin:0 -.75rem;padding-left:.75rem;padding-right:.75rem}
.jlogo{width:48px;height:48px;border:1px solid #e2e8f0;border-radius:10px;display:flex;align-items:center;justify-content:center;background:#f8fafc;font-size:18px;font-weight:700;color:#1A6FC4;flex-shrink:0}
.jtitle{font-size:15px;font-weight:600;color:#0f172a;margin-bottom:.2rem;line-height:1.3}
.jco{font-size:13px;color:#64748b;margin-bottom:.45rem}
.tags{display:flex;gap:.4rem;flex-wrap:wrap}
.tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.tc{background:#E6F1FB;color:#1A6FC4}.ts{background:#FEF0E6;color:#F47B2B}.tn{background:#f0fdf4;color:#16a34a}.tg{background:#f8fafc;border:1px solid #e2e8f0;color:#64748b}
.jmeta{text-align:right;flex-shrink:0;font-size:12px;color:#64748b}
.jsal{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:.35rem}
.spin{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#1A6FC4;border-radius:50%;animation:sp .7s linear infinite;margin:3rem auto}
@keyframes sp{to{transform:rotate(360deg)}}
.pag{display:flex;gap:.5rem;justify-content:center;padding:2rem 0}
.pbtn{width:36px;height:36px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:14px;font-weight:500;color:#64748b;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center}
.pbtn:hover,.pbtn.on{background:#1A6FC4;color:#fff;border-color:#1A6FC4}
.pbtn:disabled{opacity:.4;cursor:not-allowed}
.empty{text-align:center;padding:3rem 0;color:#64748b}
.empty h3{font-size:16px;color:#1e293b;margin-bottom:.5rem}
footer{background:#0f172a;color:rgba(255,255,255,.65);padding:2rem 1.25rem;text-align:center;font-size:13px;margin-top:2rem}
.flogo{font-size:16px;font-weight:700;color:#fff;margin-bottom:.5rem}.flogo span{color:#F47B2B}
@media(max-width:640px){.jcard{grid-template-columns:40px 1fr}.jmeta{display:none}}
</style>
</head>
<body>
<div id="ez-nav"></div>
<div class="hero">
  <h1>Construction Jobs in GCC</h1>
  <p>Browse construction, civil engineering and infrastructure jobs across the GCC region. Daily updates.</p>
  <div class="count" id="jcount">Loading...</div>
  <div class="sbox"><input type="text" id="srch" placeholder="Search within these jobs..." onkeydown="if(event.key==='Enter')doSearch()"><button onclick="doSearch()">Search</button></div>
</div>
<div class="wrap">
  <div class="jobs-hdr"><div class="jct"><strong id="cnt">—</strong> jobs found</div></div>
  <div id="list"><div class="spin"></div></div>
  <div class="pag" id="pag"></div>
</div>
<footer><div class="flogo">Ez<span>Workers</span></div><p>© 2026 EzWorkers — GCC Job Search Engine &nbsp;·&nbsp; <a href="../index.html" style="color:#F47B2B">Browse all jobs</a></p></footer>
<script src="../js/nav.js"></script>
<script>
var SB='https://wxltwnyuhiejavzichfd.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHR3bnl1aGllamF2emljaGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjk4NDYsImV4cCI6MjA5NzgwNTg0Nn0.8PH3VTz2u6rRcu-LqZYGMDbNIdj9YldNBQJ1irTCtI4';
var PAGE=20,page=1,srch='',total=0;
var FILTER='sector=eq.Construction %26 Infrastructure';

function ago(d){if(!d)return'';var diff=Date.now()-new Date(d).getTime(),h=Math.floor(diff/3600000),days=Math.floor(diff/86400000);if(h<1)return'just now';if(h<24)return h+'h ago';if(days<7)return days+'d ago';return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function isNew(d){return d&&Date.now()-new Date(d).getTime()<86400000*3;}
function doSearch(){srch=document.getElementById('srch').value.trim();page=1;load();}

async function load(){
  var list=document.getElementById('list');list.innerHTML='<div class="spin"></div>';
  var from=(page-1)*PAGE;
  var url=SB+'/rest/v1/jobs?is_active=eq.true&'+FILTER+'&order=posted_at.desc&limit='+PAGE+'&offset='+from;
  if(srch)url+='&or=(title.ilike.*'+encodeURIComponent(srch)+'*,company.ilike.*'+encodeURIComponent(srch)+'*,description.ilike.*'+encodeURIComponent(srch)+'*)';
  var r=await fetch(url,{headers:{'apikey':KEY,'Prefer':'count=exact'}});
  total=parseInt((r.headers.get('content-range')||'').split('/')[1]||'0');
  var jobs=await r.json();
  document.getElementById('cnt').textContent=total.toLocaleString();
  document.getElementById('jcount').textContent=total.toLocaleString()+' live jobs';
  if(!jobs||!jobs.length){list.innerHTML='<div class="empty"><h3>No jobs found</h3><p>Try different search terms or <a href="../index.html" style="color:#1A6FC4">browse all jobs</a></p></div>';document.getElementById('pag').innerHTML='';return;}
  list.innerHTML=jobs.map(function(j){return'<a class="jcard" href="../job.html?id='+j.id+'"><div class="jlogo">'+(j.company||'?').charAt(0)+'</div><div><div class="jtitle">'+(j.title||'Job')+'</div><div class="jco">'+(j.company||'')+(j.location&&j.location!==j.country?' · '+j.location:'')+'</div><div class="tags">'+(j.country?'<span class="tag tc">'+j.country+'</span>':'')+(j.sector?'<span class="tag ts">'+j.sector+'</span>':'')+(isNew(j.posted_at)?'<span class="tag tn">New</span>':'')+(j.job_type?'<span class="tag tg">'+j.job_type+'</span>':'')+'</div></div><div class="jmeta">'+(j.salary?'<div class="jsal">'+j.salary+'</div>':'')+'<div>'+ago(j.posted_at)+'</div></div></a>';}).join('');
  var pages=Math.ceil(total/PAGE);if(pages<=1){document.getElementById('pag').innerHTML='';return;}
  var h='<button class="pbtn"'+(page===1?' disabled':'')+' onclick="goPage('+(page-1)+')">&#8249;</button>';
  for(var p=1;p<=pages;p++){if(p===1||p===pages||Math.abs(p-page)<=2)h+='<button class="pbtn'+(p===page?' on':'')+'" onclick="goPage('+p+')">'+p+'</button>';else if(Math.abs(p-page)===3)h+='<span style="padding:0 .25rem;color:#64748b">…</span>';}
  h+='<button class="pbtn"'+(page===pages?' disabled':'')+' onclick="goPage('+(page+1)+')">&#8250;</button>';
  document.getElementById('pag').innerHTML=h;
}
function goPage(p){page=p;load();window.scrollTo({top:0,behavior:'smooth'});}
load();
</script>
</body>
</html>
