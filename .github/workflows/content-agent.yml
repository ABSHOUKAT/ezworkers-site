name: EzWorkers Content Agent

on:
  schedule:
    - cron: "0 5 * * 1"
    - cron: "0 5 * * 4"
  workflow_dispatch:

jobs:
  publish-article:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run content agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/content_agent.py

      - name: Commit and push articles.json
        run: |
          git config user.name  "EzWorkers Bot"
          git config user.email "bot@ezworkers.com"
          git add content/articles.json
          git diff --staged --quiet || git commit -m "content: auto-publish article $(date +'%Y-%m-%d')"
          git push
