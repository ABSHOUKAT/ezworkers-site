<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — EzWorkers</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="css/style.css">
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:2rem}
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;width:100%;max-width:440px;box-shadow:var(--shadow-md)}
.auth-logo{display:flex;align-items:center;gap:.6rem;margin-bottom:2rem;justify-content:center}
.auth-logo-mark{width:40px;height:40px;background:#1A6FC4;border-radius:10px;display:flex;align-items:center;justify-content:center}
.auth-logo-name{font-size:22px;font-weight:700;color:#0f172a}
.auth-logo-name span{color:#F47B2B}
h1{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:.25rem;text-align:center}
.auth-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:1.75rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;font-weight:500;color:#1e293b;margin-bottom:.35rem}
.field input,.field select{width:100%;border:1px solid #e2e8f0;border-radius:10px;padding:.65rem .85rem;font-size:14px;font-family:inherit;color:#1e293b;outline:none;transition:border .15s;background:#fff}
.field input:focus,.field select:focus{border-color:#1A6FC4}
.role-picker{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.25rem}
.role-card{border:2px solid #e2e8f0;border-radius:10px;padding:1rem;cursor:pointer;transition:all .15s;text-align:center;user-select:none}
.role-card:hover{border-color:#1A6FC4}
.role-card.selected{border-color:#1A6FC4;background:#E6F1FB}
.role-icon{font-size:24px;margin-bottom:.35rem}
.role-label{font-size:13px;font-weight:600;color:#0f172a}
.role-sub{font-size:11px;color:#64748b;margin-top:.15rem}
.btn-primary{width:100%;padding:.75rem;background:#1A6FC4;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#155fa0}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
.auth-footer{text-align:center;margin-top:1.5rem;font-size:13px;color:#64748b}
.auth-footer a{color:#1A6FC4;font-weight:500}
.result{margin-top:.85rem;padding:.75rem 1rem;border-radius:10px;font-size:13px;display:none}
.result.error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626}
.result.success{background:#f0fdf4;border:1px solid #86efac;color:#15803d}
.terms-note{font-size:11px;color:#64748b;text-align:center;margin-top:.75rem;line-height:1.5}
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="9" cy="8" r="3.5" stroke="#fff" stroke-width="1.8"/>
          <path d="M3 19c0-3.314 2.686-6 6-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M15 13l2 2 4-4" stroke="#F47B2B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="auth-logo-name">Ez<span>Workers</span></div>
    </div>

    <h1>Create your account</h1>
    <p class="auth-sub">Free to join. No credit card needed.</p>

    <p style="font-size:13px;font-weight:500;color:#1e293b;margin-bottom:.6rem">I am a...</p>
    <div class="role-picker">
      <div class="role-card selected" id="role-jobseeker" onclick="selectRole('jobseeker')">
        <div class="role-icon">👤</div>
        <div class="role-label">Job seeker</div>
        <div class="role-sub">Looking for work in GCC</div>
      </div>
      <div class="role-card" id="role-employer" onclick="selectRole('employer')">
        <div class="role-icon">🏢</div>
        <div class="role-label">Employer</div>
        <div class="role-sub">Hiring in GCC</div>
      </div>
    </div>

    <div class="field">
      <label for="full-name">Full name</label>
      <input type="text" id="full-name" placeholder="Your full name" autocomplete="name">
    </div>
    <div class="field">
      <label for="reg-email">Email address</label>
      <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" placeholder="At least 8 characters" autocomplete="new-password">
    </div>
    <div class="field" id="company-field" style="display:none">
      <label for="company-name">Company name</label>
      <input type="text" id="company-name" placeholder="Your company">
    </div>

    <button class="btn-primary" id="btn-register" type="button">Create account</button>
    <div class="result" id="result-reg"></div>
    <p class="terms-note">By creating an account you agree to our <a href="terms.html" style="color:#1A6FC4">terms of use</a> and <a href="privacy.html" style="color:#1A6FC4">privacy policy</a>.</p>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script>
// ── Inline config — no dependency on main.js or auth.js ─────────────────────
const SUPABASE_URL  = 'https://wxltwnyuhiejavzichfd.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4bHR3bnl1aGllamF2emljaGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjk4NDYsImV4cCI6MjA5NzgwNTg0Nn0.8PH3VTz2u6rRcu-LqZYGMDbNIdj9YldNBQJ1irTCtI4';

let selectedRole = 'jobseeker';

function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-jobseeker').classList.toggle('selected', role === 'jobseeker');
  document.getElementById('role-employer').classList.toggle('selected', role === 'employer');
  document.getElementById('company-field').style.display = role === 'employer' ? 'block' : 'none';
}

function showResult(type, msg) {
  const el = document.getElementById('result-reg');
  el.style.display = 'block';
  el.className = 'result ' + type;
  el.textContent = msg;
}

document.getElementById('btn-register').addEventListener('click', async function() {
  const fullName = document.getElementById('full-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const company  = document.getElementById('company-name').value.trim();
  const btn      = document.getElementById('btn-register');

  if (!fullName)           { showResult('error', 'Please enter your full name.'); return; }
  if (!email)              { showResult('error', 'Please enter your email.'); return; }
  if (password.length < 8) { showResult('error', 'Password must be at least 8 characters.'); return; }
  if (selectedRole === 'employer' && !company) { showResult('error', 'Please enter your company name.'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    // Sign up
    const signupRes = await fetch(SUPABASE_URL + '/auth/v1/signup', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, data: { role: selectedRole } }),
    });
    const signupData = await signupRes.json();
    if (!signupRes.ok) throw new Error(signupData.msg || signupData.error_description || 'Sign up failed');

    const session = signupData.session;
    const userId  = signupData.user?.id;

    if (session) {
      // Save session
      localStorage.setItem('ez_session', JSON.stringify({
        access_token:  session.access_token,
        refresh_token: session.refresh_token,
        expires_at:    Math.floor(Date.now() / 1000) + (session.expires_in || 3600),
        user:          signupData.user,
      }));

      // Create profile
      await fetch(SUPABASE_URL + '/rest/v1/profiles', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': 'Bearer ' + session.access_token,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=ignore-duplicates',
        },
        body: JSON.stringify({
          id:           userId,
          role:         selectedRole,
          full_name:    fullName,
          company_name: company || null,
        }),
      });

      localStorage.setItem('ez_profile', JSON.stringify({
        id:           userId,
        role:         selectedRole,
        full_name:    fullName,
        company_name: company || null,
      }));

      window.location.href = selectedRole === 'employer' ? 'employer-dashboard.html' : 'dashboard.html';
   } else {
      showResult('success', 'Account created! Redirecting to sign in...');
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    }
  } catch(e) {
    showResult('error', e.message);
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
});
</script>
</body>
</html>
