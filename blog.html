<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCC Career Insights — EzWorkers Blog</title>
<meta name="google-site-verification" content="7JY2z2pa6VAKSsWzTp4E1_4s-v7vc0O73CCJJDSssoE">
<meta name="description" content="Career advice, salary guides, and job market insights for professionals in Saudi Arabia, UAE, Qatar and across the GCC.">
<link rel="canonical" href="https://ezworkers.com/blog.html">
<link rel="stylesheet" href="css/style.css">
<style>
.blog-hero{background:var(--bg);border-bottom:1px solid var(--border);padding:2.5rem 0}
.blog-hero h1{font-size:2rem;font-weight:700;color:var(--dark);margin-bottom:.4rem;letter-spacing:-.3px}
.blog-hero p{color:var(--muted);font-size:15px}
.articles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;padding:2.5rem 0}
.article-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:box-shadow .15s;cursor:pointer;text-decoration:none;color:inherit;display:block}
.article-card:hover{box-shadow:var(--shadow-md)}
.article-thumb{background:linear-gradient(135deg,#1A6FC4,#1e8fd4);height:140px;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.article-thumb-text{font-size:15px;font-weight:600;color:#fff;text-align:center;line-height:1.4;opacity:.9}
.article-body{padding:1.25rem}
.article-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.65rem}
.article-title{font-size:15px;font-weight:600;color:var(--dark);margin-bottom:.5rem;line-height:1.35}
.article-excerpt{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:.75rem}
.article-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
@media(max-width:900px){.articles-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.articles-grid{grid-template-columns:1fr}}
</style>
<script src="js/analytics.js"></script>
<script src="js/share.js"></script>
</head>
<body>

<div id="ez-nav"></div>

<div class="blog-hero">
  <div class="container">
    <h1>GCC career insights</h1>
    <p>Practical advice for professionals across Saudi Arabia, UAE, Qatar and the Gulf — published every Monday and Thursday</p>
  </div>
</div>

<div class="container">
  <div class="articles-grid" id="articles-grid">
    <div style="grid-column:1/-1;text-align:center;padding:3rem 0">
      <div class="spinner" style="margin:0 auto 1rem"></div>
      <p style="color:var(--muted)">Loading articles...</p>
    </div>
  </div>
</div>

<footer style="background:#0f172a;color:rgba(255,255,255,.65);padding:2rem 1.25rem;text-align:center;font-size:13px;margin-top:2rem">
  <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:.5rem">Ez<span style="color:#F47B2B">Workers</span></div>
  <p>© 2026 EzWorkers — GCC Job Search Engine</p>
</footer>

<script src="js/nav.js"></script>
<script src="js/main.js"></script>
<script>
// Reads directly from GitHub raw — no redeployment needed when agent publishes
const ARTICLES_URL = 'https://raw.githubusercontent.com/ABSHOUKAT/ezworkers-site/main/content/articles.json';

function articleCardHTML(a) {
  const title   = currentLang === 'ar' && a.title_ar   ? a.title_ar   : a.title;
  const excerpt = currentLang === 'ar' && a.excerpt_ar ? a.excerpt_ar : a.excerpt;
  const date    = new Date(a.published_at).toLocaleDateString(
    currentLang === 'ar' ? 'ar-SA' : 'en-GB',
    { day: 'numeric', month: 'long', year: 'numeric' }
  );
  const tags = (a.tags || []).slice(0, 3).map(tag =>
    `<span class="tag">${tag}</span>`
  ).join('');

  return `
    <a class="article-card" href="article.html?id=${a.id}">
      <div class="article-thumb">
        <div class="article-thumb-text">${title.substring(0, 60)}</div>
      </div>
      <div class="article-body">
        <div class="article-tags">${tags}</div>
        <div class="article-title">${title}</div>
        <div class="article-excerpt">${excerpt}</div>
        <div class="article-meta">
          <span>${date}</span>
          <span>${a.reading_time || 4} min read</span>
        </div>
      </div>
    </a>`;
}

async function loadArticles() {
  const grid = document.getElementById('articles-grid');
  try {
    const r = await fetch(ARTICLES_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('Could not load articles');
    const articles = await r.json();

    if (!articles.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem 0;color:var(--muted)">
        <p>First articles coming Monday. Check back soon.</p>
      </div>`;
      return;
    }

    grid.innerHTML = articles.map(articleCardHTML).join('');
  } catch (e) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem 0;color:var(--muted)">
      <p>Articles loading soon. Check back shortly.</p>
    </div>`;
  }
}

loadArticles();
</script>
</body>
</html>
